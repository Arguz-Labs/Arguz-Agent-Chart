{{- $global := .Values.global | default dict -}}
{{- $credentials := $global.clusterCredentials | default (.Values.clusterCredentials | default dict) -}}
{{- if (default true $credentials.create) }}
{{- $secretName := default "arguz-credentials" $global.credentialsSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "Arguz-Agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  PROJECT_ID: {{ default "" $credentials.projectId | quote }}
  CLUSTER_ID: {{ default "" $credentials.clusterId | quote }}
  CLUSTER_TOKEN: {{ default "" $credentials.clusterToken | quote }}
{{- end }}
